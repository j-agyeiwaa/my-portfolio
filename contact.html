<main>
<section class="contact-page">
<div class="contact-info">
<h1>Get In Touch</h1>
<p>Have a question, project idea, or just want to say hi? I'd love to hear from you.</p>
<div class="contact-links">
<a href="mailto:jemimaaa12@gmail.com"> jemimaaa12@gmail.com</a>
<a href="https://github.com/jemima-aoa" target="_blank"> GitHub</a>
<a href="https://linkedin.com/in/jemimaaoa" target="_blank"> LinkedIn</a>
</div>
</div>
<form id="contact-form" class="contact-form" novalidate>
<div class="form-group">
<label for="name">Jemima Agyeiwaa Obeng-Amoako *</label>
<input type="text" id="name" name="name" placeholder="Ama Mensah">
<span class="error-msg" id="name-error"></span>
</div>
<div class="form-group">
<label for="email">Email Address *</label>
<input type="email" id="email" name="email" placeholder="ama@example.com">
<span class="error-msg" id="email-error"></span>
</div>
<div class="form-group">
<label for="message">Message *</label>
<textarea id="message" name="message" rows="6" placeholder="Tell me about your project or
question..."></textarea>
<span class="error-msg" id="message-error"></span>
</div>
<button type="submit" class="btn btn-primary">Send Message →</button>
<div id="form-success" class="hidden">
<p> Message received! I'll get back to you soon.</p>
</div>
</form>
</section>
</main>
